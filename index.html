<body>
  <iframe id="gameFrame"></iframe>
<script>
  const pathParts = window.location.pathname.split('/').filter(Boolean);

  const hasUrlMarker = pathParts[pathParts.length - 1] === "url";

  let subdomain = "";
  let GameName = "Unknown Game";

  if (hasUrlMarker) {
    
    subdomain = pathParts[pathParts.length - 2] || ""; 
    GameName = decodeURIComponent(pathParts[0] || "Unknown Game");
  } else {
    subdomain = pathParts[0] || "";
    GameName = decodeURIComponent(pathParts[1] || "Unknown Game");
  }

  const GameIconPath = decodeURIComponent(pathParts.slice(2).join('/') || "");
  
  const finalGameUrl = "https://" + subdomain + ".vercel.app";
</script>
