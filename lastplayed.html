<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Played Games</title>
<style>
  body { font-family: Arial, sans-serif; margin: 20px; background-color: #ffffff; }
  h1 { text-align: center; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
  .game-card { padding: 10px; background-color: #f0f0f0; border-radius: 10px; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.2); cursor: pointer; transition: transform 0.15s; }
  .game-card:hover { transform: scale(1.05); }
  .game-card img { width: 100px; height: 100px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; background-color: #ddd; }
  .controls { text-align: center; margin-bottom: 20px; }
  button { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; margin: 5px; font-weight: bold; }
  #clearButton { background-color: #ff4d4d; color: white; }
  #addButton { background-color: #4CAF50; color: white; }
</style>
</head>
<body>

<h1>Games You've Played</h1>

<div class="controls">
  <button id="addButton">Add Game Manually</button>
  <button id="clearButton">Clear History</button>
</div>

<div class="grid" id="gamesGrid"></div>

<script>
  const FALLBACK = 'https://cdn.jsdelivr.net/gh/ThatWirdGuy/Game-Icons@main/Missing.png';
  const grid = document.getElementById('gamesGrid');

  function loadGames() {
    grid.innerHTML = '';
    const games = JSON.parse(localStorage.getItem('playedGames') || '[]');

    if (games.length === 0) {
      grid.innerHTML = '<div style="grid-column: 1/-1; text-align:center;">You haven\'t added any games yet.</div>';
      return;
    }

    games.forEach(game => {
      const card = document.createElement('div');
      card.className = 'game-card';
      
      const img = document.createElement('img');
      // Convert GitHub blob links to Raw links automatically
      let iconUrl = game.icon || FALLBACK;
      if(iconUrl.includes('github.com') && iconUrl.includes('/blob/')) {
        iconUrl = iconUrl.replace('github.com', 'raw.githubusercontent.com').replace('/blob/', '/');
      }
      
      img.src = iconUrl;
      img.onerror = () => img.src = FALLBACK;

      card.addEventListener('click', () => {
        const win = window.open('about:blank', '_blank');
        if (win) {
          win.document.body.style.margin = '0';
          win.document.body.style.height = '100vh';
          win.document.body.style.overflow = 'hidden';
          const iframe = win.document.createElement('iframe');
          iframe.style.width = '100%';
          iframe.style.height = '100%';
          iframe.style.border = 'none';
          iframe.src = game.url;
          win.document.body.appendChild(iframe);
        }
      });

      card.appendChild(img);
      const title = document.createElement('div');
      title.textContent = game.name || 'Untitled Game';
      card.appendChild(title);
      grid.appendChild(card);
    });
  }

  // Manually add a game since Inspect is blocked
  document.getElementById('addButton').addEventListener('click', () => {
    const name = prompt("Enter Game Name:");
    const url = prompt("Enter Game URL (the link to the game):");
    const icon = prompt("Enter Icon URL (optional):");

    if (name && url) {
      let games = JSON.parse(localStorage.getItem('playedGames') || '[]');
      games.push({ name, url, icon });
      localStorage.setItem('playedGames', JSON.stringify(games));
      loadGames();
    }
  });

  document.getElementById('clearButton').addEventListener('click', () => {
    if(confirm("Clear everything?")) {
      localStorage.removeItem('playedGames');
      loadGames();
    }
  });

  loadGames();
</script>
</body>
</html>
